<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Thunder Vault</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/login.css') }}">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="brand-column">
                <span class="material-symbols-outlined massive-icon">bolt</span>
                <h1>THUNDER <span>VAULT</span></h1>
            </div>

            <div class="form-column">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access the vault.</p>

                {% if error %}
                    <div class="error-banner">
                        <span class="material-symbols-outlined">error</span>
                        <span>Invalid Credentials</span>
                    </div>
                {% endif %}

                <form action="{{ route }}" method="POST">
                    
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-container">
                            <span class="material-symbols-outlined input-icon">person</span>
                            <input type="text" name="username" id="username" placeholder="Username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-container">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input type="password" name="password" id="password" placeholder="Password" required>
                            
                            <button type="button" class="btn-toggle-pass" onclick="togglePassword()" title="Show Password">
                                <span class="material-symbols-outlined" id="eyeIcon">visibility</span>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login">Login to Vault</button>
                </form>

                <div class="auth-redirect">
                    <p>Don't have an account? <a href="/auth/signup">Sign up</a></p>
                </div>
            </div>
            
        </div>
    </div>

    <script src="{{ url_for('static', path='js/login.js') }}"></script>
</body>
</html>
