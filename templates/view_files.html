<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ directory_name }}</title>
</head>
<body>
    <h1>{{ directory_name }}</h1>

    {% if files %}
        <ul>
            {% for file in files %}
                <li>
                    <a href="/download/{{ directory_name }}/{{ file }}" download="{{ file }}">{{ file }}</a>
                </li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
